<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Tic Tac Toe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f0ff;
    --magenta: #ff00e5;
    --yellow: #ffe600;
    --green: #39ff14;
    --red: #ff3131;
    --bg-dark: #06060f;
    --bg-card: #0c0c24;
    --bg-cell: #10103a;
    --border-glow: #1a1a50;
    --text-dim: #5a5a8a;
    --text-light: #c0c0e8;
  }

  html { height: 100%; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-dark);
    color: var(--text-light);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated Background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(0,240,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.025) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(0,240,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 85%, rgba(255,0,229,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0% { opacity: 0.5; }
    100% { opacity: 1; }
  }

  /* ── Main Container ── */
  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 16px 18px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* ── Title ── */
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: #fff;
    text-shadow:
      0 0 8px var(--cyan),
      0 0 25px var(--cyan),
      0 0 50px rgba(0,240,255,0.4);
    margin-top: 8px;
    animation: titleGlow 3s ease-in-out infinite alternate;
    user-select: none;
  }
  .title .accent {
    color: var(--magenta);
    text-shadow:
      0 0 8px var(--magenta),
      0 0 25px var(--magenta),
      0 0 50px rgba(255,0,229,0.4);
  }
  @keyframes titleGlow {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.15); }
  }

  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 8px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    margin-top: -8px;
    user-select: none;
  }

  /* ── Panels ── */
  .panel {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
  }
  .panel-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: flex;
    gap: 6px;
    width: 100%;
  }
  .mode-tab {
    flex: 1;
    padding: 13px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
    user-select: none;
  }
  .mode-tab:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .mode-tab.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,240,255,0.07);
    box-shadow: 0 0 18px rgba(0,240,255,0.12), inset 0 0 18px rgba(0,240,255,0.04);
  }

  /* ── AI Config Panel ── */
  #aiConfig {
    display: none;
  }
  #aiConfig.visible {
    display: block;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .config-group label {
    display: block;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .btn-group {
    display: flex;
    gap: 5px;
  }
  .opt-btn {
    flex: 1;
    padding: 9px 4px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    background: var(--bg-cell);
    border: 1px solid var(--border-glow);
    border-radius: 7px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
    user-select: none;
  }
  .opt-btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .opt-btn.selected {
    border-color: var(--magenta);
    color: var(--magenta);
    background: rgba(255,0,229,0.1);
    box-shadow: 0 0 10px rgba(255,0,229,0.15);
  }

  /* ── Status Bar ── */
  .status-area {
    width: 100%;
    text-align: center;
    min-height: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .turn-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    line-height: 1.4;
  }
  .turn-text.x-color { color: var(--cyan); text-shadow: 0 0 14px var(--cyan); }
  .turn-text.o-color { color: var(--magenta); text-shadow: 0 0 14px var(--magenta); }
  .turn-text.win-color { color: var(--green); text-shadow: 0 0 20px var(--green); animation: winPulse 0.6s ease-in-out infinite alternate; }
  .turn-text.draw-color { color: var(--yellow); text-shadow: 0 0 14px var(--yellow); }

  @keyframes winPulse {
    0% { opacity: 0.75; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.06); }
  }

  /* AI Thinking Dots */
  .thinking-bar {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: var(--magenta);
    margin-top: 4px;
  }
  .thinking-bar.visible { display: flex; }
  .dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 6px var(--magenta);
    animation: dotPulse 1.4s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%,80%,100% { opacity: 0.15; transform: scale(0.7); }
    40% { opacity: 1; transform: scale(1.3); }
  }

  /* ── GAME BOARD ── */
  .board-container {
    display: flex;
    justify-content: center;
    width: 100%;
    padding: 4px 0;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
    width: min(82vw, 340px);
    height: min(82vw, 340px);
  }

  .cell {
    background: var(--bg-cell);
    border: 1px solid var(--border-glow);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: radial-gradient(circle at center, rgba(0,240,255,0.06) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .cell:hover:not(.taken):not(.locked)::after { opacity: 1; }
  .cell:hover:not(.taken):not(.locked) {
    border-color: rgba(0,240,255,0.5);
    box-shadow: 0 0 22px rgba(0,240,255,0.12), inset 0 0 18px rgba(0,240,255,0.04);
    transform: scale(1.04);
  }
  .cell.taken { cursor: default; }
  .cell.locked { cursor: default; pointer-events: none; }

  /* Symbols */
  .sym {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.2rem, 10vw, 4rem);
    font-weight: 900;
    line-height: 1;
    position: relative;
    z-index: 2;
    animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .sym.x {
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan), 0 0 22px var(--cyan), 0 0 44px rgba(0,240,255,0.35);
  }
  .sym.o {
    color: var(--magenta);
    text-shadow: 0 0 8px var(--magenta), 0 0 22px var(--magenta), 0 0 44px rgba(255,0,229,0.35);
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-15deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Win Cells */
  .cell.win-cell {
    border-color: var(--green) !important;
    animation: winGlow 0.7s ease-in-out infinite alternate;
  }
  .cell.win-cell .sym {
    color: #fff !important;
    text-shadow: 0 0 12px var(--green), 0 0 35px var(--green), 0 0 70px var(--green) !important;
  }
  @keyframes winGlow {
    0% { box-shadow: 0 0 8px rgba(57,255,20,0.2), inset 0 0 12px rgba(57,255,20,0.05); background: rgba(57,255,20,0.03); }
    100% { box-shadow: 0 0 24px rgba(57,255,20,0.45), inset 0 0 28px rgba(57,255,20,0.1); background: rgba(57,255,20,0.07); }
  }

  /* Draw Cells */
  .cell.draw-cell {
    border-color: rgba(255,230,0,0.25) !important;
    box-shadow: 0 0 10px rgba(255,230,0,0.08);
  }

  /* ── Scoreboard ── */
  .scores-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    width: 100%;
  }
  .score-box {
    background: var(--bg-cell);
    border: 1px solid var(--border-glow);
    border-radius: 10px;
    padding: 10px 6px;
    text-align: center;
    transition: all 0.3s ease;
  }
  .score-box .s-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-box .s-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.7rem;
    font-weight: 900;
    line-height: 1;
  }
  .score-box.sb-p1 .s-num { color: var(--cyan); text-shadow: 0 0 12px var(--cyan); }
  .score-box.sb-p2 .s-num { color: var(--magenta); text-shadow: 0 0 12px var(--magenta); }
  .score-box.sb-draw .s-num { color: var(--yellow); text-shadow: 0 0 12px var(--yellow); }

  .score-box.flash { animation: flashAnim 0.45s ease; }
  @keyframes flashAnim {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* ── Action Buttons ── */
  .actions {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  .act-btn {
    flex: 1;
    padding: 12px 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .act-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .act-btn:hover::before { opacity: 1; }

  .act-btn.btn-c {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  .act-btn.btn-c::before { background: rgba(0,240,255,0.1); }
  .act-btn.btn-c:hover { box-shadow: 0 0 20px rgba(0,240,255,0.25); }

  .act-btn.btn-r {
    border-color: var(--red);
    color: var(--red);
  }
  .act-btn.btn-r::before { background: rgba(255,49,49,0.1); }
  .act-btn.btn-r:hover { box-shadow: 0 0 20px rgba(255,49,49,0.25); }

  /* ── Footer ── */
  .foot {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-align: center;
    padding: 14px 0 24px;
    opacity: 0.4;
    user-select: none;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .app { padding: 10px 12px 24px; gap: 12px; }
    .title { font-size: 1.55rem; letter-spacing: 3px; }
    .subtitle { font-size: 0.5rem; letter-spacing: 5px; }
    .config-grid { grid-template-columns: 1fr; gap: 10px; }
    .mode-tab { font-size: 0.58rem; padding: 11px 6px; letter-spacing: 1px; }
    .score-box .s-num { font-size: 1.3rem; }
    .act-btn { font-size: 0.55rem; padding: 10px 6px; letter-spacing: 1px; }
    .turn-text { font-size: 0.75rem; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- Title -->
  <h1 class="title">TIC TAC <span class="accent">TOE</span></h1>
  <p class="subtitle">Neon Arena</p>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tabAI" onclick="switchMode('ai')">🤖 AI vs Human</button>
    <button class="mode-tab" id="tabPVP" onclick="switchMode('pvp')">👥 Player vs Player</button>
  </div>

  <!-- AI Configuration -->
  <div class="panel visible" id="aiConfig">
    <div class="panel-label">⚙ Battle Configuration</div>
    <div class="config-grid">
      <div class="config-group">
        <label>Your Symbol</label>
        <div class="btn-group">
          <button class="opt-btn selected" id="symX" onclick="pickSymbol('X')">✕  X</button>
          <button class="opt-btn" id="symO" onclick="pickSymbol('O')">◯  O</button>
        </div>
      </div>
      <div class="config-group">
        <label>AI Difficulty</label>
        <div class="btn-group">
          <button class="opt-btn" id="diffEasy" onclick="pickDiff('easy')">Easy</button>
          <button class="opt-btn selected" id="diffMed" onclick="pickDiff('medium')">Med</button>
          <button class="opt-btn" id="diffHard" onclick="pickDiff('hard')">Hard</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-area">
    <div class="turn-text x-color" id="statusText">PLAYER X — YOUR TURN</div>
    <div class="thinking-bar" id="thinkBar">
      AI THINKING <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-container">
    <div class="board" id="board"></div>
  </div>

  <!-- Scoreboard -->
  <div class="panel">
    <div class="panel-label" id="scoreLabel">📊 Scoreboard — AI Mode</div>
    <div class="scores-grid">
      <div class="score-box sb-p1" id="boxP1">
        <div class="s-label" id="lblP1">Human (X)</div>
        <div class="s-num" id="numP1">0</div>
      </div>
      <div class="score-box sb-draw" id="boxDraw">
        <div class="s-label">Draws</div>
        <div class="s-num" id="numDraw">0</div>
      </div>
      <div class="score-box sb-p2" id="boxP2">
        <div class="s-label" id="lblP2">AI (O)</div>
        <div class="s-num" id="numP2">0</div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="actions">
    <button class="act-btn btn-c" onclick="restartGame()">⟳ Restart</button>
    <button class="act-btn btn-r" onclick="resetScores()">✕ Reset Scores</button>
  </div>

  <div class="foot">NEON ARENA • TIC TAC TOE</div>
</div>

<script>
// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const WINS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let mode = 'ai';            // 'ai' | 'pvp'
let grid = Array(9).fill('');
let turn = 'X';             // current turn symbol
let active = true;
let thinking = false;

// AI config
let humanSym = 'X';
let aiSym = 'O';
let diff = 'medium';

// Independent scores
const score = {
  ai:  { p1: 0, p2: 0, d: 0 },
  pvp: { p1: 0, p2: 0, d: 0 }
};

// ═══════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════
const $board      = document.getElementById('board');
const $status     = document.getElementById('statusText');
const $think      = document.getElementById('thinkBar');
const $aiCfg      = document.getElementById('aiConfig');
const $tabAI      = document.getElementById('tabAI');
const $tabPVP     = document.getElementById('tabPVP');
const $scoreLabel = document.getElementById('scoreLabel');
const $lblP1      = document.getElementById('lblP1');
const $lblP2      = document.getElementById('lblP2');
const $numP1      = document.getElementById('numP1');
const $numP2      = document.getElementById('numP2');
const $numDraw    = document.getElementById('numDraw');
const $boxP1      = document.getElementById('boxP1');
const $boxP2      = document.getElementById('boxP2');
const $boxDraw    = document.getElementById('boxDraw');

// ═══════════════════════════════════════
//  INIT BOARD CELLS
// ═══════════════════════════════════════
function buildBoard() {
  $board.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    c.dataset.idx = i;
    c.addEventListener('click', () => onCellClick(i));
    $board.appendChild(c);
  }
}
buildBoard();

function getCells() {
  return $board.querySelectorAll('.cell');
}

// ═══════════════════════════════════════
//  MODE SWITCH
// ═══════════════════════════════════════
function switchMode(m) {
  mode = m;
  $tabAI.classList.toggle('active', m === 'ai');
  $tabPVP.classList.toggle('active', m === 'pvp');

  if (m === 'ai') {
    $aiCfg.classList.add('visible');
    $scoreLabel.textContent = '📊 Scoreboard — AI Mode';
  } else {
    $aiCfg.classList.remove('visible');
    $scoreLabel.textContent = '📊 Scoreboard — PvP Mode';
  }

  syncLabels();
  renderScores();
  restartGame();
}

// ═══════════════════════════════════════
//  AI CONFIG
// ═══════════════════════════════════════
function pickSymbol(s) {
  humanSym = s;
  aiSym = s === 'X' ? 'O' : 'X';
  document.getElementById('symX').classList.toggle('selected', s === 'X');
  document.getElementById('symO').classList.toggle('selected', s === 'O');
  syncLabels();
  renderScores();
  restartGame();
}

function pickDiff(d) {
  diff = d;
  document.getElementById('diffEasy').classList.toggle('selected', d === 'easy');
  document.getElementById('diffMed').classList.toggle('selected', d === 'medium');
  document.getElementById('diffHard').classList.toggle('selected', d === 'hard');
  restartGame();
}

// ═══════════════════════════════════════
//  LABELS & SCORES
// ═══════════════════════════════════════
function syncLabels() {
  if (mode === 'ai') {
    $lblP1.textContent = 'Human (' + humanSym + ')';
    $lblP2.textContent = 'AI (' + aiSym + ')';
  } else {
    $lblP1.textContent = 'Player 1 (X)';
    $lblP2.textContent = 'Player 2 (O)';
  }
}

function renderScores() {
  const s = score[mode];
  $numP1.textContent = s.p1;
  $numP2.textContent = s.p2;
  $numDraw.textContent = s.d;
}

function flash(el) {
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ═══════════════════════════════════════
//  STATUS INDICATOR
// ═══════════════════════════════════════
function updateStatus() {
  $status.className = 'turn-text';
  if (!active) return;

  if (mode === 'ai') {
    if (turn === humanSym) {
      $status.textContent = 'YOUR TURN — ' + humanSym;
    } else {
      $status.textContent = 'AI THINKING...';
    }
  } else {
    const name = turn === 'X' ? 'PLAYER 1' : 'PLAYER 2';
    $status.textContent = name + ' — ' + turn + "'s TURN";
  }
  $status.classList.add(turn === 'X' ? 'x-color' : 'o-color');
}

// ═══════════════════════════════════════
//  CELL CLICK
// ═══════════════════════════════════════
function onCellClick(i) {
  if (!active || grid[i] || thinking) return;
  if (mode === 'ai' && turn !== humanSym) return;

  placeSymbol(i, turn);

  const res = checkEnd();
  if (res) return endGame(res);

  nextTurn();

  if (mode === 'ai') aiMove();
}

function placeSymbol(i, sym) {
  grid[i] = sym;
  const cell = getCells()[i];
  cell.classList.add('taken');
  const sp = document.createElement('span');
  sp.className = 'sym ' + sym.toLowerCase();
  sp.textContent = sym === 'X' ? '✕' : '◯';
  cell.appendChild(sp);
}

function nextTurn() {
  turn = turn === 'X' ? 'O' : 'X';
  updateStatus();
}

// ═══════════════════════════════════════
//  WIN / DRAW CHECK
// ═══════════════════════════════════════
function checkEnd() {
  for (const w of WINS) {
    const [a, b, c] = w;
    if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) {
      return { winner: grid[a], line: w };
    }
  }
  if (grid.every(v => v)) return { winner: null, line: null };
  return null;
}

function endGame(res) {
  active = false;
  $think.classList.remove('visible');

  const cells = getCells();

  if (res.winner) {
    // Highlight winning cells
    res.line.forEach(i => cells[i].classList.add('win-cell'));

    $status.className = 'turn-text win-color';
    if (mode === 'ai') {
      $status.textContent = res.winner === humanSym ? '🏆 YOU WIN!' : '🤖 AI WINS!';
    } else {
      const name = res.winner === 'X' ? 'PLAYER 1' : 'PLAYER 2';
      $status.textContent = '🏆 ' + name + ' WINS!';
    }

    // Update scores
    if (mode === 'ai') {
      if (res.winner === humanSym) { score.ai.p1++; flash($boxP1); }
      else { score.ai.p2++; flash($boxP2); }
    } else {
      if (res.winner === 'X') { score.pvp.p1++; flash($boxP1); }
      else { score.pvp.p2++; flash($boxP2); }
    }
  } else {
    // Draw
    cells.forEach(c => c.classList.add('draw-cell'));
    $status.className = 'turn-text draw-color';
    $status.textContent = '⚡ DRAW!';
    score[mode].d++;
    flash($boxDraw);
  }

  // Lock all cells
  cells.forEach(c => c.classList.add('locked'));
  renderScores();
}

// ═══════════════════════════════════════
//  AI LOGIC
// ═══════════════════════════════════════
function aiMove() {
  thinking = true;
  $think.classList.add('visible');
  updateStatus();

  const delay = 350 + Math.random() * 350;
  setTimeout(() => {
    if (!active) { thinking = false; $think.classList.remove('visible'); return; }

    let move;
    if (diff === 'easy') move = aiRandom();
    else if (diff === 'medium') move = aiMedium();
    else move = aiBest();

    thinking = false;
    $think.classList.remove('visible');

    if (move !== null && move !== undefined) {
      placeSymbol(move, aiSym);
      const res = checkEnd();
      if (res) return endGame(res);
      nextTurn();
    }
  }, delay);
}

// Easy: random
function aiRandom() {
  const open = grid.map((v, i) => v === '' ? i : null).filter(v => v !== null);
  return open.length ? open[Math.floor(Math.random() * open.length)] : null;
}

// Medium: always win/block, else 50% best / 50% random
function aiMedium() {
  // Immediate win?
  for (const w of WINS) {
    const m = spotTwo(w, aiSym);
    if (m !== null) return m;
  }
  // Immediate block?
  for (const w of WINS) {
    const m = spotTwo(w, humanSym);
    if (m !== null) return m;
  }
  return Math.random() < 0.5 ? aiBest() : aiRandom();
}

function spotTwo(combo, sym) {
  const vals = combo.map(i => grid[i]);
  if (vals.filter(v => v === sym).length === 2 && vals.filter(v => v === '').length === 1) {
    return combo[vals.indexOf('')];
  }
  return null;
}

// Hard: minimax
function aiBest() {
  let best = -Infinity, pick = null;
  for (let i = 0; i < 9; i++) {
    if (!grid[i]) {
      grid[i] = aiSym;
      const s = minimax(false, 0);
      grid[i] = '';
      if (s > best) { best = s; pick = i; }
    }
  }
  return pick;
}

function minimax(isMax, depth) {
  const r = mmCheck();
  if (r !== null) {
    if (r === aiSym) return 10 - depth;
    if (r === humanSym) return depth - 10;
    return 0;
  }
  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (!grid[i]) {
        grid[i] = aiSym;
        best = Math.max(best, minimax(false, depth + 1));
        grid[i] = '';
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (!grid[i]) {
        grid[i] = humanSym;
        best = Math.min(best, minimax(true, depth + 1));
        grid[i] = '';
      }
    }
    return best;
  }
}

function mmCheck() {
  for (const [a, b, c] of WINS) {
    if (grid[a] && grid[a] === grid[b] && grid[a] === grid[c]) return grid[a];
  }
  if (grid.every(v => v)) return 'draw';
  return null;
}

// ═══════════════════════════════════════
//  RESTART / RESET
// ═══════════════════════════════════════
function restartGame() {
  grid = Array(9).fill('');
  active = true;
  thinking = false;
  turn = 'X';
  $think.classList.remove('visible');

  buildBoard();
  updateStatus();

  // If AI mode and AI is X, AI goes first
  if (mode === 'ai' && aiSym === 'X') {
    aiMove();
  }
}

function resetScores() {
  score[mode] = { p1: 0, p2: 0, d: 0 };
  renderScores();
  flash($boxP1);
  flash($boxP2);
  flash($boxDraw);
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
syncLabels();
renderScores();
updateStatus();
</script>
